name: plutoploy bot

on:
  workflow_dispatch:
  push:


permissions:
  contents: write
  pull-requests: write

jobs:
  detect-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Check for existing Containerfile
        id: existing
        run: |
          if [ -f Containerfile ] || [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "NOTE: A Containerfile or Dockerfile already exists in this repository."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gather codebase context
        id: context
        run: |
          {
            echo "REPOSITORY FILE TREE:"
            find . -type f -not -path './.git/*' -not -path './.vscode/*' -not -path './public/*' -not -path './.github/*' | sort | head -150
            echo ""
            echo "KEY CONFIGURATION FILES"
            for file in package.json requirements.txt pyproject.toml Cargo.toml go.mod pom.xml build.gradle Gemfile composer.json Makefile Justfile Taskfile.yaml; do
              if [ -f "$file" ]; then
                echo ""
                echo "--- $file ---"
                cat "$file"
              fi
            done
            echo ""
            echo "KNOWN ENTRY POINTS (full contents):"
            for entry in main.py app.py manage.py server.py index.ts server.ts main.go cmd/main.go main.rs src/main.rs src/bin/*.rs src/lib.rs pubspec.yaml Application.java Main.java; do
              if [ -f "$entry" ]; then
                echo ""
                echo "=== $entry (FULL) ==="
                cat "$entry"
              fi
            done
            echo ""
            echo "OTHER SOURCE FILES (first 10 lines each):"
            find . -type f \( -name "*.py" -o -name "*.js" -o -name "*.ts" -o -name "*.go" -o -name "*.rs" -o -name "*.java" -o -name "*.rb" -o -name "*.php" \) \
              -not -path './.git/*' -not -name "main.py" -not -name "app.py" -not -name "index.ts" -not -name "server.ts" -not -name "main.go" -not -name "main.rs" \
              | head -15 | while read -r f; do
                echo ""
                echo "=== $f ==="
                head -n 10 "$f"
              done
          } > repo_context.txt

          # Truncate at 12KB while keeping whole lines
          total=0
          while IFS= read -r line; do
            linelen=${#line}
            if [ $((total + linelen + 1)) -le 12000 ]; then
              echo "$line"
              total=$((total + linelen + 1))
            else
              break
            fi
          done < repo_context.txt > repo_context_trimmed.txt

          delimiter="EOF_$(date +%s)_$$"
          {
            echo "content<<${delimiter}"
            cat repo_context_trimmed.txt
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize codebase context
        id: summarize
        uses: ai-action/ollama-action@master
        with:
          model: gemma4:12b
          prompt: |
            You are given the following codebase context. Analyze it and return only a short, tech‑focused summary.
            Context:
            ${{ steps.context.outputs.content }}

      - name: Generate raw Containerfile
        id: detect
        uses: ai-action/ollama-action@master
        with:
          model: gemma4:12b
          prompt: |
            The project is: ${{ steps.summarize.outputs.content }}
            Return ONLY a Containerfile to containerize this application.
            No markdown fences, no commentary, no explanation – just raw Containerfile contents.
            The Containerfile MUST include a CMD or ENTRYPOINT instruction.

      - name: Clean and write Containerfile
        id: clean
        run: |
          clean=$(echo "$RESPONSE" | sed -e '/^```/d' -e '/^```Containerfile/d' -e '/^```Dockerfile/d')
          if ! echo "$clean" | grep -qE '^FROM '; then
            echo "ERROR: AI response missing FROM instruction. Raw output:"
            echo "$RESPONSE"
            exit 1
          fi

          echo "$clean" > Containerfile
        env:
          RESPONSE: ${{ steps.detect.outputs.content }}

      - name: Validate Containerfile structure
        run: |
          echo "--- Containerfile ---"
          cat Containerfile
          echo "--------------------"
          if ! grep -qE '^FROM ' Containerfile; then
            echo "ERROR: No FROM instruction found"
            exit 1
          fi
          if ! grep -qE '^(CMD|ENTRYPOINT)' Containerfile; then
            echo "ERROR: No CMD or ENTRYPOINT instruction found"
            exit 1
          fi

      - name: Ensure .dockerignore exists
        run: |
          if [ ! -f .dockerignore ]; then
            cat > .dockerignore << 'EOF'
          .git
          .github
          node_modules
          __pycache__
          .venv
          venv
          .mypy_cache
          .pytest_cache
          .ruff_cache
          *.pyc
          .env
          .env.*
          !.env.example
          target
          Cargo.lock
          *.tar.gz
          .DS_Store
          EOF
            echo "Created .dockerignore"
          else
            echo ".dockerignore already exists"
          fi

      - name: Build-verify Containerfile 
        run: |
          if command -v buildah &> /dev/null; then
            buildah bud --layers=false -f Containerfile . && echo "Build verification passed." || {
              echo "WARNING: Containerfile failed build verification."
              echo "The file will still be included in the PR for manual review."
            }
          elif command -v docker &> /dev/null; then
            docker build --no-cache -f Containerfile . && echo "Build verification passed." || {
              echo "WARNING: Containerfile failed build verification."
              echo "The file will still be included in the PR for manual review."
            }
          else
            echo "SKIP: Neither buildah nor docker available for build verification."
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@main
        with:
          commit-message: "chore: generate Containerfile via plutoploy bot"
          title: "chore: add auto-generated Containerfile"
          body: |
            This PR was automatically generated by the Plutoploy bot.

            - ✅ Generated Containerfile and .dockerignore based on repository analysis.
            - 🧪 Build verification (if tools were available): see job logs.
          base: ${{ github.ref_name }}
          delete-branch: true
